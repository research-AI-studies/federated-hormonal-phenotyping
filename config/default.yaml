# Default run configuration. Paths are local-only; never commit real data.
seed: 42

data:
  # Point this at a private local file when running on real data.
  path: data/example/cohort.csv
  id_col: patient_id
  target_hint: diagnosis        # used only to colour figures, never as a label
  drop_cols: []

preprocessing:
  missing_threshold: 0.40        # drop columns with > 40% missingness
  impute:
    method: mice                 # {mice, median_mode}
    max_iter: 10
  winsorize:
    enabled: true
    limits: [0.01, 0.01]
  scale: zscore                  # {zscore, minmax, none}
  one_hot: true

model:
  vae:
    hidden_dims: [64, 32]
    latent_dim: 8
    dropout: 0.1
    lr: 0.001
    epochs: 50
    batch_size: 64
    beta: 1.0                    # KL weight
  som:
    grid: [8, 8]
    sigma: 1.2
    learning_rate: 0.5
    iterations: 5000
    neighbourhood: gaussian

federated:
  enabled: true
  num_clients: 3
  rounds: 20
  local_epochs: 2
  fraction_fit: 1.0
  partition: dirichlet           # {iid, dirichlet}
  dirichlet_alpha: 0.5

privacy:
  enabled: true
  target_epsilon: 5.0
  target_delta: 1.0e-5
  max_grad_norm: 1.0
  noise_multiplier: null         # auto-calibrated to target_epsilon if null

validation:
  k_range: [2, 3, 4, 5, 6, 7, 8]
  consensus_resamples: 100
  subsample_fraction: 0.8

interpretability:
  shap_background: 100
  shap_nsamples: 200

outputs:
  dir: outputs                   # git-ignored
  figures_dir: outputs/figures
  tables_dir: outputs/tables
